<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR кастомная кнопка</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./xr.js" async data-preload-chunks="slam"></script>
    <style>
        body { margin: 0; overflow: hidden; background: black; color: #FCD780; font-family: system-ui; }
        #info {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); border: 2px solid #FCD780; border-radius: 60px;
            padding: 12px 30px; font-size: 28px; z-index: 1000;
        }
        #arButton {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: #FCD780; color: black; border: none; border-radius: 60px;
            padding: 20px 40px; font-size: 36px; font-weight: bold; z-index: 1000;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <div id="info">⚡ Нажми СТАРТ AR</div>
    <button id="arButton">🚀 СТАРТ AR</button>
    <canvas id="canvas"></canvas>

    <script>
        let scene, camera, renderer, reticle, model;
        let hitTestSource, xrRefSpace;

        window.addEventListener('xrloaded', () => {
            console.log('✅ XR8 загружен');
        });

        document.getElementById('arButton').addEventListener('click', async () => {
            if (!window.XR8) return alert('Движок не загружен');

            // --- Three.js инициализация ---
            initThree();

            // --- Запуск XR8 ---
            try {
                await XR8.run({
                    canvas: document.getElementById('canvas'),
                    verbose: true,
                    allowedDevices: XR8.XrConfig.device().ANY,
                    cameraConfig: { direction: XR8.XrConfig.camera().BACK }
                });

                // --- Добавляем модуль рендеринга камеры и XrController ---
                XR8.addCameraPipelineModule(XR8.GlTextureRenderer.pipelineModule());
                await XR8.loadChunk('slam');
                XR8.addCameraPipelineModule(XR8.XrController.pipelineModule());

                // --- Ждём, пока появится видео ---
                XR8.addCameraPipelineModule({
                    name: 'custom-hit-test',
                    onCameraStatusChange: ({ status, video }) => {
                        if (status === 'hasVideo') {
                            console.log('Видео получено, начинаем hit test');
                            startHitTest();
                        }
                    },
                    onUpdate: ({ processCpuResult }) => {
                        const reality = processCpuResult.reality;
                        if (!reality) return;

                        // Обновляем прицел (если есть hit test)
                        if (reality.hitTest) {
                            const pose = reality.hitTest;
                            reticle.visible = true;
                            reticle.position.copy(pose.position);
                            reticle.quaternion.copy(pose.rotation);
                        } else {
                            reticle.visible = false;
                        }
                    },
                    onRender: () => {
                        renderer.render(scene, camera);
                    }
                });

            } catch (e) {
                console.error('Ошибка запуска AR:', e);
            }
        });

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Прицел
            reticle = new THREE.Mesh(
                new THREE.TorusGeometry(0.1, 0.01, 16, 32),
                new THREE.MeshStandardMaterial({ color: 0xFCD780, emissive: 0x332200 })
            );
            reticle.rotation.x = Math.PI / 2;
            reticle.visible = false;
            scene.add(reticle);

            // Свет
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // Заглушка модели (куб)
            const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const material = new THREE.MeshStandardMaterial({ color: 0xFCD780 });
            model = new THREE.Mesh(geometry, material);
            model.visible = false;
            scene.add(model);
        }

        function startHitTest() {
            // Здесь можно добавить запрос hit test через XR8.XrController.hitTest
            // Но лучше использовать модуль XrController, который сам выдаёт результаты в processCpuResult.reality.hitTest
            console.log('Hit test активен');
        }
    </script>
</body>
</html>
