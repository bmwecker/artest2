<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR с кастомной кнопкой</title>
    <script src="./xr.js" async data-preload-chunks="slam"></script>
    <style>
        body { margin: 0; overflow: hidden; background: black; color: #FCD780; font-family: system-ui; }
        #info {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); border: 2px solid #FCD780; border-radius: 60px;
            padding: 12px 30px; font-size: 28px; z-index: 1000;
        }
        #arButton {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: #FCD780; color: black; border: none; border-radius: 60px;
            padding: 20px 40px; font-size: 36px; font-weight: bold; z-index: 1000;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #canvas { width: 100vw; height: 100vh; display: block; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="info">⚡ Нажми СТАРТ AR, затем коснись для размещения</div>
    <button id="arButton">🚀 СТАРТ AR</button>
    <canvas id="canvas"></canvas>

    <script>
        window.addEventListener('xrloaded', () => {
            console.log('✅ XR8 загружен');
        });

        let hitTestSource = null;
        let xrRefSpace = null;
        let modelLoaded = false;
        let model = null;

        // Загружаем модель (ваш GLB)
        function loadModel() {
            // Простейший способ – создать тестовый куб, пока не убедимся, что hit-test работает
            // Позже заменим на вашу модель
            const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const material = new THREE.MeshStandardMaterial({ color: 0xFCD780 });
            model = new THREE.Mesh(geometry, material);
            model.visible = false;
            scene.add(model);
            modelLoaded = true;
        }

        // --- Three.js сцена ---
        let scene, camera, renderer, reticle;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Прицел (золотой тор)
            reticle = new THREE.Mesh(
                new THREE.TorusGeometry(0.1, 0.01, 16, 32),
                new THREE.MeshStandardMaterial({ color: 0xFCD780, emissive: 0x332200 })
            );
            reticle.rotation.x = Math.PI / 2;
            reticle.visible = false;
            scene.add(reticle);

            // Свет
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // Загружаем модель (пока куб)
            loadModel();
        }

        document.getElementById('arButton').addEventListener('click', async () => {
            if (!window.XR8) {
                alert('Движок ещё не загружен');
                return;
            }

            initThree();

            // Запускаем сессию
            try {
                await XR8.run({
                    canvas: document.getElementById('canvas'),
                    verbose: true,
                    allowedDevices: XR8.XrConfig.device().ANY,
                    cameraConfig: { direction: XR8.XrConfig.camera().BACK }
                });

                // После запуска получаем reference space и hit test source
                const session = XR8.xrSession(); // предположим, что есть такой метод – нужно уточнить API
                // В документации 8th Wall для прямого доступа к XR-сессии есть XR8.xrSession().
                // Если нет, используем XR8.XrController.pipelineModule().

                // Более правильный способ: использовать XR8.XrController
                // Сначала убедимся, что XrController загружен
                await XR8.loadChunk('slam');
                XR8.addCameraPipelineModule(XR8.XrController.pipelineModule());

                // Запускаем hit test через XR8.XrController.hitTest() в цикле рендеринга
                function onXRFrame() {
                    // Получаем результаты hit test
                    const hitTestResults = XR8.XrController.hitTest(0.5, 0.5, ['FEATURE_POINT']);
                    if (hitTestResults.length > 0) {
                        const pose = hitTestResults[0];
                        reticle.visible = true;
                        reticle.position.copy(pose.position);
                        reticle.quaternion.copy(pose.rotation);
                        infoDiv.innerHTML = '✨ Коснись для размещения';
                    } else {
                        reticle.visible = false;
                    }

                    renderer.render(scene, camera);
                    requestAnimationFrame(onXRFrame);
                }
                onXRFrame();

            } catch (e) {
                console.error('Ошибка запуска AR:', e);
            }
        });
    </script>
</body>
</html>
