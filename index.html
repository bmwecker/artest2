<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebXR AR minimal</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:black; color:#FCD780; font-family:system-ui; }
        #info {
            position:fixed; top:30px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.7); border:2px solid #FCD780; border-radius:60px;
            padding:12px 30px; font-size:min(28px,5vw); z-index:1000;
        }
        #arButton {
            position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.7); border:3px solid #FCD780; border-radius:60px;
            padding:20px 60px; font-size:36px; color:#FCD780; z-index:1000;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div id="info">⚡ Нажми СТАРТ AR</div>
    <button id="arButton">📱 СТАРТ AR</button>

    <script>
        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        document.body.appendChild(canvas);

        const engine = new BABYLON.Engine(canvas, true);
        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(0,0,0,0);

        const camera = new BABYLON.FreeCamera('camera', new BABYLON.Vector3(0,0,0), scene);
        camera.setEnabled(false);

        const light = new BABYLON.HemisphericLight('light', new BABYLON.Vector3(0,1,0), scene);
        light.intensity = 0.8;

        let model;
        BABYLON.SceneLoader.ImportMeshAsync('', '', 'textured_mesh.glb', scene).then(result => {
            model = result.meshes[0];
            model.scaling.scaleInPlace(0.2); // подберите масштаб
            model.setEnabled(false);
            console.log('Модель загружена');
        });

        const reticleMat = new BABYLON.StandardMaterial('reticleMat', scene);
        reticleMat.emissiveColor = new BABYLON.Color3(0.99,0.84,0.5);
        reticleMat.alpha = 0.6;
        const reticle = BABYLON.MeshBuilder.CreateTorus('reticle', {diameter:0.2, thickness:0.01}, scene);
        reticle.material = reticleMat;
        reticle.rotation.x = Math.PI/2;
        reticle.setEnabled(false);

        const infoDiv = document.getElementById('info');
        const arButton = document.getElementById('arButton');

        arButton.addEventListener('click', async () => {
            if (!model) {
                infoDiv.innerHTML = '⏳ Модель загружается...';
                return;
            }

            try {
                // Создаём XR-опыт с явным запросом hit-test
                const xr = await scene.createDefaultXRExperienceAsync({
                    uiOptions: { 
                        sessionMode: 'immersive-ar', 
                        referenceSpaceType: 'local' 
                    },
                    optionalFeatures: ['hit-test'], // обязательно!
                    camera: camera
                });

                // Ждём полной инициализации сессии (нужно для featuresManager)
                await xr.baseExperience.sessionManager.initializeSessionAsync();

                // Включаем hit test через baseExperience.featuresManager
                const hitTest = xr.baseExperience.featuresManager.enableFeature(BABYLON.WebXRHitTest, 'latest');

                hitTest.onHitTestResultObservable.add(results => {
                    if (results.length) {
                        const pose = results[0].pose;
                        reticle.setEnabled(true);
                        reticle.position.copyFrom(pose.position);
                        reticle.rotationQuaternion = pose.rotationQuaternion;
                        infoDiv.innerHTML = '✨ Коснись для размещения';
                    } else {
                        reticle.setEnabled(false);
                    }
                });

                // Входим в AR
                await xr.baseExperience.enterXRAsync('immersive-ar', 'unbounded');
                infoDiv.innerHTML = '🔍 Ищу поверхность...';

                // Размещение по касанию
                xr.input.onSelectEndedObservable.add(() => {
                    if (reticle.isEnabled() && model) {
                        const newModel = model.clone('placed');
                        newModel.setParent(null);
                        newModel.position.copyFrom(reticle.position);
                        newModel.rotationQuaternion = reticle.rotationQuaternion.clone();
                        scene.addMesh(newModel);
                        infoDiv.innerHTML = '✅ Размещено';
                    }
                });

            } catch (err) {
                console.error(err);
                infoDiv.innerHTML = '❌ Ошибка: ' + err.message;
            }
        });

        engine.runRenderLoop(() => scene.render());
        window.addEventListener('resize', () => engine.resize());
    </script>
</body>
</html>
