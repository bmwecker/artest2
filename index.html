<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebXR AR с Babylon.js</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            background: black;
            color: #FCD780;
            touch-action: none;
        }
        #info {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(252,215,128,0.5);
            border-radius: 60px;
            padding: 12px 30px;
            font-size: min(28px, 5vw);
            color: #FCD780;
            z-index: 1000;
            white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .button-panel {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
            pointer-events: none;
            padding: 0 10px;
        }
        .button-panel button {
            pointer-events: auto;
            width: min(200px, 35vw);
            height: min(200px, 35vw);
            border-radius: 50%;
            border: 3px solid rgba(252,215,128,0.6);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: #FCD780;
            font-size: min(40px, 8vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .button-panel button:active {
            transform: scale(0.95);
        }
        .button-panel button span:last-child {
            font-size: min(24px, 4vw);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .button-panel button.music-on {
            background: rgba(252,215,128,0.2);
            border-color: #FCD780;
        }
        #site-link {
            position: fixed;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(252,215,128,0.6);
            border-radius: 80px;
            padding: 16px 40px;
            color: #FCD780;
            font-size: min(36px, 6vw);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 1000;
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            #info { font-size: 18px; padding: 8px 16px; top: 20px; white-space: normal; width: 90%; }
            #site-link { top: 100px; padding: 12px 24px; font-size: 28px; }
            .button-panel button { width: min(150px, 30vw); height: min(150px, 30vw); }
        }
    </style>
</head>
<body>
    <div id="info">⚡ Нажми AR, затем коснись для размещения</div>
    <a id="site-link" href="https://alef-bet.tech" target="_blank">🔗 Alef-Bet</a>
    <div class="button-panel">
        <button id="arButton"><span>📱</span><span>AR</span></button>
        <button id="musicButton" class="music-off"><span>🔇</span><span>MUSIC</span></button>
        <button id="photoButton"><span>📸</span><span>PHOTO</span></button>
    </div>
    <audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        (function() {
            const canvas = document.createElement('canvas');
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            document.body.appendChild(canvas);

            const engine = new BABYLON.Engine(canvas, true);
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0, 0, 0, 0); // прозрачный для AR

            // Свет
            const light = new BABYLON.HemisphericLight('light', new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.8;

            // --- Загрузка модели (ваш файл) ---
            let userModel = null;
            let modelLoaded = false;
            BABYLON.SceneLoader.ImportMeshAsync('', '', 'textured_mesh.glb', scene).then(result => {
                userModel = result.meshes[0];
                userModel.scaling.scaleInPlace(0.2); // подберите масштаб
                userModel.setEnabled(false); // пока не размещаем
                modelLoaded = true;
                console.log('✅ Модель загружена');
            }).catch(err => {
                console.error('❌ Ошибка загрузки модели:', err);
                document.getElementById('info').innerHTML = '❌ Ошибка загрузки модели';
            });

            // --- Прицел (золотой тор) ---
            const reticleMat = new BABYLON.StandardMaterial('reticleMat', scene);
            reticleMat.emissiveColor = new BABYLON.Color3(0.99, 0.84, 0.5); // #FCD780
            reticleMat.alpha = 0.6;
            const reticleMesh = BABYLON.MeshBuilder.CreateTorus('reticle', { diameter: 0.2, thickness: 0.01 }, scene);
            reticleMesh.material = reticleMat;
            reticleMesh.rotation.x = Math.PI / 2; // горизонтально
            reticleMesh.setEnabled(false);

            // --- UI элементы ---
            const infoDiv = document.getElementById('info');
            const arButton = document.getElementById('arButton');
            const musicButton = document.getElementById('musicButton');
            const photoButton = document.getElementById('photoButton');
            const bgMusic = document.getElementById('bgMusic');
            let isMusicPlaying = false;

            let xrHelper, xrHitTest;
            let hitTestAvailable = false;

            // --- Запуск AR ---
            arButton.addEventListener('click', async () => {
                if (!modelLoaded) {
                    infoDiv.innerHTML = '⏳ Модель ещё загружается...';
                    return;
                }

                try {
                    if (!xrHelper) {
                        // Создаём XR-опыт с явным указанием reference space 'local' для лучшей совместимости
                        xrHelper = await BABYLON.WebXRDefaultExperience.CreateAsync(scene, {
                            optionalFeatures: true,
                            uiOptions: {
                                sessionMode: 'immersive-ar',
                                referenceSpaceType: 'local' // 'local-floor' иногда вызывает проблемы
                            }
                        });
                        console.log('✅ XR helper создан');

                        // Включаем hit test
                        xrHitTest = xrHelper.featuresManager.enableFeature(BABYLON.WebXRFeatureName.HIT_TEST, 'latest');
                        if (xrHitTest) {
                            console.log('✅ Hit test включён');
                            xrHitTest.onHitTestResultObservable.add((results) => {
                                console.log(`📍 Hit test results: ${results.length}`);
                                if (results.length > 0) {
                                    const pose = results[0].pose;
                                    if (pose) {
                                        reticleMesh.setEnabled(true);
                                        reticleMesh.position.copyFrom(pose.position);
                                        reticleMesh.rotationQuaternion = pose.rotationQuaternion;
                                        hitTestAvailable = true;
                                        infoDiv.innerHTML = '✨ Коснись для размещения';
                                    } else {
                                        reticleMesh.setEnabled(false);
                                        hitTestAvailable = false;
                                    }
                                } else {
                                    reticleMesh.setEnabled(false);
                                    hitTestAvailable = false;
                                }
                            });
                        } else {
                            console.error('❌ Не удалось включить hit test');
                        }
                    }

                    // Входим в AR-сессию
                    await xrHelper.enterXRAsync('immersive-ar', 'unbounded');
                    infoDiv.innerHTML = '🔍 Ищу поверхность...';

                    // Обработка касания для размещения
                    xrHelper.input.onSelectEndedObservable.add(() => {
                        console.log(`👆 Касание: hitTestAvailable=${hitTestAvailable}, reticle visible=${reticleMesh.isEnabled()}`);
                        if (hitTestAvailable && reticleMesh.isEnabled() && userModel) {
                            // Клонируем модель и размещаем
                            const newModel = userModel.clone('placedModel', null);
                            newModel.setParent(null);
                            newModel.position.copyFrom(reticleMesh.position);
                            newModel.rotationQuaternion = reticleMesh.rotationQuaternion.clone();
                            scene.addMesh(newModel);
                            // userModel.setEnabled(true); // раскомментируйте, если хотите, чтобы оригинал тоже появился
                            infoDiv.innerHTML = '✅ Объект размещён';
                        }
                    });

                } catch (err) {
                    console.error('❌ Ошибка запуска AR:', err);
                    infoDiv.innerHTML = '❌ AR не запустился: ' + err.message;
                }
            });

            // --- Музыка ---
            musicButton.addEventListener('click', () => {
                if (isMusicPlaying) {
                    bgMusic.pause();
                    musicButton.classList.remove('music-on');
                    musicButton.innerHTML = '<span>🔇</span><span>MUSIC</span>';
                } else {
                    bgMusic.play().catch(e => console.warn('Музыка не играет:', e));
                    musicButton.classList.add('music-on');
                    musicButton.innerHTML = '<span>🔊</span><span>MUSIC</span>';
                }
                isMusicPlaying = !isMusicPlaying;
            });

            // --- Фото в предпросмотре ---
            photoButton.addEventListener('click', () => {
                infoDiv.innerHTML = '📸 Снимок...';
                try {
                    BABYLON.Tools.CreateScreenshot(engine, scene.activeCamera, { width: 1024 });
                    infoDiv.innerHTML = '⚡ Нажми AR, затем коснись для размещения';
                } catch (e) {
                    console.error('Ошибка фото:', e);
                    alert('Снимок не удался');
                }
            });

            // --- Рендер цикл ---
            engine.runRenderLoop(() => scene.render());
            window.addEventListener('resize', () => engine.resize());

            // --- iOS предупреждение ---
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
                infoDiv.innerHTML = '📱 WebXR не работает на iOS. Используйте Android.';
                arButton.disabled = true;
            }
        })();
    </script>
</body>
</html>
