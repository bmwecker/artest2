<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR с 8th Wall (отладка)</title>
    <!-- Подключаем A-Frame и компоненты 8th Wall (CDN) -->
    <script src="https://cdn.8thwall.com/web/aframe/8.5.0/aframe-xr.js"></script>
    <script src="https://cdn.8thwall.com/web/aframe/8.5.0/aframe-xr-hit-test.js"></script>
    <!-- Подключаем локальный движок 8th Wall -->
    <script async src="./xr/xr.js" data-preload-chunks="slam" onload="console.log('✅ xr.js loaded')" onerror="console.error('❌ xr.js failed to load')"></script>
    <style>
      /* ... ваши стили (без изменений) ... */
    </style>
  </head>
  <body>
    <div id="info">⚡ Найди поверхность и коснись</div>
    <a id="site-link" href="https://alef-bet.tech" target="_blank">🔗 Alef-Bet</a>

    <a-scene
      xr-web="disableTrackingUI: true;"
      xr-mode="world"
      xr-hit-test="target:#model-container; visualFeedback: true;"
      background="color: #000000"
      loading-screen="dotsColor: #FCD780; backgroundColor: black"
      renderer="colorManagement: true;"
      physics="driver: ammo; debug: false;"
      gltf-model="dracoDecoderUrl: https://www.gstatic.com/draco/versioned/decoders/1.4.1/"
    >
      <a-entity id="model-container" gltf-model="url(textured_mesh.glb)" scale="0.2 0.2 0.2" visible="false"></a-entity>
      <a-camera></a-camera>
    </a-scene>

    <div class="button-panel">
      <button id="arButton"><span>📱</span><span>AR</span></button>
      <button id="musicButton" class="music-off"><span>🔇</span><span>MUSIC</span></button>
    </div>

    <audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
      (function() {
        const infoDiv = document.getElementById('info');
        const arButton = document.getElementById('arButton');
        const musicButton = document.getElementById('musicButton');
        const audio = document.getElementById('bgMusic');

        console.log('⏳ Сценарий запущен, ожидаем XR8...');

        // Функция, которая запускает AR (будет вызвана, когда XR8 доступен)
        function startAR() {
          if (!window.XR8) {
            console.error('❌ XR8 не определён!');
            infoDiv.innerHTML = '❌ Движок не загружен';
            return;
          }
          console.log('✅ XR8 доступен, вызываем enterXR');
          XR8.enterXR('immersive-ar', 'local')
            .then(() => console.log('✅ enterXR успешно'))
            .catch(err => {
              console.error('❌ Ошибка enterXR:', err);
              infoDiv.innerHTML = '❌ Ошибка AR: ' + err.message;
            });
        }

        arButton.addEventListener('click', () => {
          console.log('👆 Нажата кнопка AR');
          startAR();
        });

        // Музыка
        let isPlaying = false;
        musicButton.addEventListener('click', () => {
          if (isPlaying) {
            audio.pause();
            musicButton.classList.remove('music-on');
            musicButton.innerHTML = '<span>🔇</span><span>MUSIC</span>';
          } else {
            audio.play().catch(e => console.warn('Music play failed:', e));
            musicButton.classList.add('music-on');
            musicButton.innerHTML = '<span>🔊</span><span>MUSIC</span>';
          }
          isPlaying = !isPlaying;
        });

        // iOS подсказка
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
          infoDiv.innerHTML = '📱 На iOS музыка в AR не играет';
        }

        // Если XR8 уже загружен (маловероятно, но на всякий случай)
        if (window.XR8) {
          console.log('✅ XR8 уже присутствует');
        }
      })();
    </script>
  </body>
</html>
