<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebXR hit test (Three.js)</title>
    <style>
        body { margin:0; overflow:hidden; background:black; color:#FCD780; font-family:sans-serif; }
        #info {
            position:fixed; top:30px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.7); border:2px solid #FCD780; border-radius:60px;
            padding:12px 30px; font-size:min(28px,5vw); z-index:1000;
        }
        #arButton {
            position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.7); border:3px solid #FCD780; border-radius:60px;
            padding:20px 60px; font-size:36px; color:#FCD780; z-index:1000;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div id="info">⚡ Нажми СТАРТ AR</div>
    <button id="arButton">📱 СТАРТ AR</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const infoDiv = document.getElementById('info');
        const arButton = document.getElementById('arButton');

        // --- Настройка сцены, камеры, рендерера ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Свет
        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
        scene.add(light);

        // --- Загрузка модели (ваш файл) ---
        const loader = new GLTFLoader();
        let model = null;
        loader.load('textured_mesh.glb', (gltf) => {
            model = gltf.scene;
            model.scale.set(0.2, 0.2, 0.2); // подберите масштаб
            model.visible = false;
            scene.add(model);
            console.log('✅ Модель загружена');
        }, undefined, (err) => {
            console.error('❌ Ошибка загрузки модели', err);
            infoDiv.innerHTML = '❌ Ошибка загрузки модели';
        });

        // --- Прицел (золотой тор) ---
        const reticle = new THREE.Mesh(
            new THREE.TorusGeometry(0.1, 0.01, 16, 32),
            new THREE.MeshStandardMaterial({ color: 0xFCD780, emissive: 0x332200 })
        );
        reticle.rotation.x = Math.PI / 2;
        reticle.visible = false;
        scene.add(reticle);

        // --- Переменные для hit test ---
        let hitTestSource = null;
        let xrReferenceSpace = null;

        // --- Обработка клика по AR-кнопке ---
        arButton.addEventListener('click', () => {
            if (!navigator.xr) {
                infoDiv.innerHTML = '❌ WebXR не поддерживается';
                return;
            }

            navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                if (!supported) {
                    infoDiv.innerHTML = '❌ AR не поддерживается. Установите ARCore.';
                    return;
                }

                // Запрашиваем сессию прямо в обработчике клика
                navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['hit-test'] })
                    .then(onSessionStarted)
                    .catch(err => {
                        console.error(err);
                        infoDiv.innerHTML = '❌ Ошибка: ' + err.message;
                    });
            });
        });

        async function onSessionStarted(session) {
            // Перебираем поддерживаемые reference space типы
            const spaceTypes = ['unbounded', 'local-floor', 'local'];
            let space = null;
            for (const type of spaceTypes) {
                try {
                    space = await session.requestReferenceSpace(type);
                    console.log(`✅ Используем reference space: ${type}`);
                    break;
                } catch (e) {
                    console.warn(`❌ Reference space ${type} не поддерживается`, e);
                }
            }
            if (!space) {
                throw new Error('Нет поддерживаемого reference space');
            }

            // Передаём сессию в рендерер и устанавливаем reference space
            renderer.xr.setSession(session);
            renderer.xr.setReferenceSpace(space);
            xrReferenceSpace = space;

            // Запрашиваем hit test source
            try {
                const source = await session.requestHitTestSource({ space: space });
                hitTestSource = source;
                infoDiv.innerHTML = '🔍 Ищу поверхность...';
            } catch (err) {
                console.error('Ошибка hit test source', err);
                infoDiv.innerHTML = '❌ Не удалось инициализировать hit test';
                return;
            }

            // Обработка касания для размещения объекта
            session.addEventListener('select', () => {
                if (reticle.visible && model) {
                    // Клонируем модель и ставим в позицию прицела
                    const placed = model.clone();
                    placed.position.copy(reticle.position);
                    placed.quaternion.copy(reticle.quaternion);
                    placed.visible = true;
                    scene.add(placed);
                    infoDiv.innerHTML = '✅ Объект размещён';
                }
            });

            session.addEventListener('end', () => {
                infoDiv.innerHTML = '⚡ Сессия завершена. Нажми СТАРТ AR';
                hitTestSource = null;
            });
        }

        // --- Цикл рендеринга (выполняется для каждого кадра WebXR) ---
        renderer.setAnimationLoop((time, frame) => {
            if (frame && hitTestSource && xrReferenceSpace) {
                const hitTestResults = frame.getHitTestResults(hitTestSource);
                if (hitTestResults.length > 0) {
                    const pose = hitTestResults[0].getPose(xrReferenceSpace);
                    if (pose) {
                        reticle.visible = true;
                        reticle.position.copy(pose.transform.position);
                        reticle.quaternion.copy(pose.transform.orientation);
                        infoDiv.innerHTML = '✨ Коснись для размещения';
                    } else {
                        reticle.visible = false;
                    }
                } else {
                    reticle.visible = false;
                }
            }

            renderer.render(scene, camera);
        });

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- iOS предупреждение ---
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
            infoDiv.innerHTML = '📱 WebXR не работает на iOS. Используйте Android + Chrome.';
            arButton.disabled = true;
        }
    </script>
</body>
</html>
