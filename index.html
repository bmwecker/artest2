<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR с 8th Wall (локальный движок)</title>
    <!-- Подключаем A-Frame и компоненты 8th Wall (CDN, открытая часть) -->
    <script src="https://cdn.8thwall.com/web/aframe/8.5.0/aframe-xr.js"></script>
    <script src="https://cdn.8thwall.com/web/aframe/8.5.0/aframe-xr-hit-test.js"></script>
    <!-- Подключаем локальный движок 8th Wall (из папки xr) -->
    <script async src="./xr/xr.js" data-preload-chunks="slam"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        background: black;
        color: #FCD780;
      }
      /* Подсказка сверху */
      #info {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(8px);
        border: 2px solid #FCD780;
        border-radius: 60px;
        padding: 12px 30px;
        font-size: min(28px, 5vw);
        z-index: 10000;
        white-space: nowrap;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      /* Панель круглых кнопок внизу (только музыка) */
      .button-panel {
        position: fixed;
        bottom: 60px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 20px;
        z-index: 10000;
        pointer-events: none;
      }
      .button-panel button {
        pointer-events: auto;
        width: min(270px, 40vw);
        height: min(270px, 40vw);
        border-radius: 50%;
        border: 3px solid rgba(252,215,128,0.6);
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(8px);
        color: #FCD780;
        font-size: min(180px, 25vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      }
      .button-panel button span:last-child {
        font-size: min(48px, 7vw);
        text-transform: uppercase;
      }
      .button-panel button.music-on {
        background: rgba(252,215,128,0.2);
        border-color: #FCD780;
      }
      /* Овальная кнопка-ссылка */
      #site-link {
        position: fixed;
        top: 120px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(8px);
        border: 2px solid #FCD780;
        border-radius: 80px;
        padding: 16px 40px;
        color: #FCD780;
        font-size: min(36px, 6vw);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 16px;
        z-index: 10000;
        white-space: nowrap;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      #site-link:hover {
        background: rgba(40,40,40,0.9);
        border-color: #FCD780;
      }
      @media (max-width: 480px) {
        #info { font-size: 18px; padding: 8px 16px; top: 20px; white-space: normal; width: 90%; }
        #site-link { top: 100px; padding: 12px 24px; font-size: 28px; }
      }
    </style>
  </head>
  <body>
    <div id="info">⚡ Найди поверхность и коснись, чтобы разместить</div>
    <a id="site-link" href="https://alef-bet.tech" target="_blank">🔗 Alef-Bet</a>

    <!-- A-Frame сцена с hit-test и world tracking -->
    <a-scene
      xr-web="allowedDevices: any; disableTrackingUI: false;"
      xr-mode="world"
      xr-hit-test="target:#model-container;"
      background="color: #000000"
      loading-screen="dotsColor: #FCD780; backgroundColor: black"
      renderer="colorManagement: true;"
      gltf-model="dracoDecoderUrl: https://www.gstatic.com/draco/versioned/decoders/1.4.1/"
    >
      <!-- Ассеты: ваша модель -->
      <a-assets>
        <a-asset-item id="cactus-model" src="textured_mesh.glb"></a-asset-item>
      </a-assets>

      <!-- Шаблон модели (скрыт, будет клонироваться при касании) -->
      <a-entity id="model-container" gltf-model="#cactus-model" scale="0.2 0.2 0.2" visible="false"></a-entity>

      <!-- Камера -->
      <a-camera></a-camera>
    </a-scene>

    <!-- Панель кнопок (только музыка) -->
    <div class="button-panel">
      <button id="musicButton" class="music-off"><span>🔇</span><span>MUSIC</span></button>
    </div>

    <audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
      (function() {
        const infoDiv = document.getElementById('info');
        const musicButton = document.getElementById('musicButton');
        const audio = document.getElementById('bgMusic');

        // --- Музыка ---
        let isPlaying = false;
        musicButton.addEventListener('click', () => {
          if (isPlaying) {
            audio.pause();
            musicButton.classList.remove('music-on');
            musicButton.innerHTML = '<span>🔇</span><span>MUSIC</span>';
          } else {
            audio.play().catch(e => console.warn('Music play failed:', e));
            musicButton.classList.add('music-on');
            musicButton.innerHTML = '<span>🔊</span><span>MUSIC</span>';
          }
          isPlaying = !isPlaying;
        });

        // --- Подсказка для iOS ---
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
          infoDiv.innerHTML = '📱 На iOS музыка в AR не играет. Используйте системную кнопку AR.';
        }

        // --- Логирование загрузки движка (для отладки) ---
        console.log('Страница загружена, ожидаем XR8...');
        if (window.XR8) {
          console.log('XR8 уже доступен');
        } else {
          window.addEventListener('xrloaded', () => console.log('✅ XR8 загружен'));
        }
      })();
    </script>
  </body>
</html>
