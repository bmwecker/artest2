<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR модель с музыкой</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, sans-serif;
            background: black;
            color: #FCD780;
        }
        model-viewer {
            width: 100%;
            height: 100vh;
            background: black;
        }
        .button-panel {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10000;
            pointer-events: none;
        }
        .button-panel button {
            pointer-events: auto;
            width: min(270px, 40vw);
            height: min(270px, 40vw);
            border-radius: 50%;
            border: 3px solid rgba(252,215,128,0.6);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: #FCD780;
            font-size: min(180px, 25vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .button-panel button span:last-child {
            font-size: min(48px, 7vw);
            text-transform: uppercase;
        }
        .button-panel button.music-on {
            background: rgba(252,215,128,0.2);
            border-color: #FCD780;
        }
        .note {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            border: 2px solid #FCD780;
            border-radius: 60px;
            padding: 12px 30px;
            font-size: min(28px, 5vw);
            z-index: 10000;
            white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #site-link {
            position: fixed;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid #FCD780;
            border-radius: 80px;
            padding: 16px 40px;
            color: #FCD780;
            font-size: min(36px, 6vw);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10000;
            white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #site-link:hover {
            background: rgba(40,40,40,0.9);
            border-color: #FCD780;
        }
        @media (max-width: 480px) {
            .note { font-size: 18px; padding: 8px 16px; top: 20px; white-space: normal; width: 90%; }
            #site-link { top: 100px; padding: 12px 24px; font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="note" id="platformNote">⚡ Нажми AR, затем двигай объект пальцем. Фото – системной кнопкой.</div>
    <a id="site-link" href="https://alef-bet.tech" target="_blank">🔗 Alef-Bet</a>

    <model-viewer 
        id="modelViewer"
        src="textured_mesh.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-placement="floor"
        ar-scale="auto"
        camera-controls
        auto-rotate
        environment-image="neutral"
        shadow-intensity="1"
        alt="3D модель">
    </model-viewer>

    <div class="button-panel">
        <button id="arButton"><span>📱</span><span>AR</span></button>
        <button id="musicButton" class="music-off"><span>🔇</span><span>MUSIC</span></button>
        <button id="photoButton"><span>📸</span><span>PHOTO</span></button>
    </div>

    <audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        (function() {
            const modelViewer = document.getElementById('modelViewer');
            const arButton = document.getElementById('arButton');
            const musicButton = document.getElementById('musicButton');
            const photoButton = document.getElementById('photoButton');
            const audio = document.getElementById('bgMusic');
            const platformNote = document.getElementById('platformNote');

            // Обновление состояния AR-кнопки
            modelViewer.addEventListener('load', () => {
                arButton.disabled = !modelViewer.canActivateAR;
                if (!modelViewer.canActivateAR) {
                    platformNote.innerHTML = '❌ AR не поддерживается на этом устройстве.';
                }
            });

            // Запуск AR
            arButton.addEventListener('click', () => {
                if (modelViewer.canActivateAR) {
                    modelViewer.activateAR();
                } else {
                    alert('AR недоступен.');
                }
            });

            // Музыка
            let isPlaying = false;
            musicButton.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    musicButton.classList.remove('music-on');
                    musicButton.innerHTML = '<span>🔇</span><span>MUSIC</span>';
                } else {
                    audio.play().catch(e => console.warn('Music error:', e));
                    musicButton.classList.add('music-on');
                    musicButton.innerHTML = '<span>🔊</span><span>MUSIC</span>';
                }
                isPlaying = !isPlaying;
            });

            // Скриншот модели в предпросмотре
            photoButton.addEventListener('click', () => {
                platformNote.innerHTML = '📸 Снимок...';
                try {
                    const data = modelViewer.toDataURL();
                    if (data) {
                        const link = document.createElement('a');
                        link.download = 'model.png';
                        link.href = data;
                        link.click();
                    }
                } catch (e) {
                    alert('Не удалось сделать снимок');
                } finally {
                    platformNote.innerHTML = '⚡ Нажми AR, затем двигай объект пальцем. Фото – системной кнопкой.';
                }
            });

            // iOS особенности
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
                platformNote.innerHTML = '📱 На iOS музыка в AR не играет. Используйте системную кнопку фото.';
            }
        })();
    </script>
</body>
</html>
