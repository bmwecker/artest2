<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR model with music</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; background: black; }
    model-viewer { width: 100%; height: 100vh; background: black; }
    .button-panel {
      position: fixed; bottom: 60px; left: 0; right: 0;
      display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;
      z-index: 10000; pointer-events: none; padding: 0 10px;
    }
    .button-panel button {
      pointer-events: auto; width: min(270px, 40vw); aspect-ratio: 1/1; border-radius: 50%;
      border: 2px solid rgba(252, 215, 128, 0.5); background: rgba(0, 0, 0, 0.6);
      color: #FCD780; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      cursor: pointer; transition: all 0.2s ease;
    }
    .button-panel button:hover { border-color: #FCD780; background: rgba(20,20,20,0.8); transform: scale(1.02); }
    .button-panel button:active { transform: scale(0.95); }
    .button-panel button span:first-child { font-size: min(180px, 25vw); line-height: 1; }
    .button-panel button span:last-child { font-size: min(48px, 7vw); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #FCD780; }
    .button-panel button.music-off { border-color: rgba(252, 215, 128, 0.4); }
    .button-panel button.music-on { border-color: #FCD780; background: rgba(252,215,128,0.1); box-shadow: 0 0 30px rgba(252,215,128,0.3); }
    .note {
      position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
      color: #FCD780; font-size: min(32px, 6vw); background: rgba(0,0,0,0.6);
      padding: 12px 30px; backdrop-filter: blur(4px); border-radius: 60px;
      border: 1px solid rgba(252,215,128,0.3); z-index: 9999; white-space: nowrap;
    }
    @media (max-width: 480px) {
      .note { top: 20px; font-size: 20px; padding: 8px 16px; white-space: normal; width: 90%; }
    }
    .site-link-button {
      position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
      border: 3px solid rgba(252,215,128,0.6); border-radius: 80px;
      padding: 24px 60px; color: #FCD780; font-size: min(48px,8vw);
      font-weight: 600; text-decoration: none; display: flex; align-items: center;
      gap: 20px; z-index: 10001; cursor: pointer; white-space: nowrap;
    }
    .site-link-button:hover { border-color: #FCD780; background: rgba(40,40,40,0.8); transform: translateX(-50%) scale(1.02); }
    @media (max-width: 480px) {
      .site-link-button { top: 100px; padding: 16px 30px; font-size: 32px; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="note" id="platformNote">
    ⚡ Tap AR, then move object with finger. Use system camera button for photos.
  </div>

  <a href="https://alef-bet.tech" target="_blank" rel="noopener noreferrer" class="site-link-button">
    <span>🔗</span> Alef-Bet
  </a>

  <model-viewer 
    id="modelViewer"
    src="textured_mesh.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    ar-scale="auto"
    camera-controls
    auto-rotate
    environment-image="neutral"
    shadow-intensity="1"
    alt="3D model">
  </model-viewer>

  <div class="button-panel">
    <button id="arButton" class="ar-button"><span>📱</span><span>AR</span></button>
    <button id="musicButton" class="music-off"><span>🔇</span><span>MUSIC</span></button>
    <button id="photoButton"><span>📸</span><span>PHOTO</span></button>
  </div>

  <audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

  <script>
    (function() {
      const modelViewer = document.getElementById('modelViewer');
      const arButton = document.getElementById('arButton');
      const musicButton = document.getElementById('musicButton');
      const photoButton = document.getElementById('photoButton');
      const bgMusic = document.getElementById('bgMusic');
      const platformNote = document.getElementById('platformNote');

      function updateARStatus() {
        if (modelViewer.canActivateAR) arButton.disabled = false;
        else { arButton.disabled = true; platformNote.innerHTML = '❌ AR not supported'; }
      }
      if (modelViewer.loaded) updateARStatus();
      else modelViewer.addEventListener('load', updateARStatus);

      arButton.addEventListener('click', () => {
        if (modelViewer.canActivateAR) modelViewer.activateAR();
        else alert('AR not available');
      });

      let isPlaying = false;
      musicButton.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isPlaying) {
          bgMusic.pause();
          musicButton.classList.replace('music-on','music-off');
          musicButton.innerHTML = '<span>🔇</span><span>MUSIC</span>';
        } else {
          bgMusic.play().then(() => {
            musicButton.classList.replace('music-off','music-on');
            musicButton.innerHTML = '<span>🔊</span><span>MUSIC</span>';
          }).catch(() => alert('Could not play music'));
        }
        isPlaying = !isPlaying;
      });

      photoButton.addEventListener('click', () => {
        platformNote.innerHTML = '📸 Capturing...';
        try {
          const data = modelViewer.toDataURL();
          if (data) {
            const link = document.createElement('a');
            link.download = 'model.png'; link.href = data; link.click();
            platformNote.innerHTML = '⚡ Tap AR, then use system camera button for photos.';
          } else throw new Error();
        } catch { alert('Screenshot failed'); }
      });

      if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream) {
        platformNote.innerHTML = '📱 On iOS, use system camera button in AR. Music stops.';
      }
    })();
  </script>
</body>
</html>
